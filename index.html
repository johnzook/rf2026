<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rebecca Farm — Ride Times</title>
<style>
  :root {
    --bg: #f6f5f2;
    --card: #ffffff;
    --ink: #1c1c1c;
    --muted: #6b6b6b;
    --line: #e3e1dc;
    --accent: #1a6b3c;
    --accent-soft: #e6f2ea;
    --soon: #b45309;
    --soon-soft: #fdf1e0;
    --past: #a3a3a3;
    --delay: #b91c1c;
    --shadow: 0 10px 30px rgba(0,0,0,.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.4;
    -webkit-text-size-adjust: 100%;
  }
  header {
    position: sticky; top: 0; z-index: 20;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    padding: 10px 14px 8px;
  }
  h1 { font-size: 17px; margin: 0; font-weight: 700; letter-spacing: -.01em; }
  .sub { font-size: 12px; color: var(--muted); margin-top: 1px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .sub .err { color: var(--delay); }
  .days { display: flex; gap: 6px; margin-top: 8px; overflow-x: auto; padding-bottom: 2px; }
  .day-chip {
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    border-radius: 999px; padding: 4px 12px; font-size: 13px; white-space: nowrap;
    cursor: pointer; font-family: inherit;
  }
  .day-chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .delay-banner {
    margin: 10px 14px 0; padding: 8px 12px; border-radius: 10px;
    background: #fdeaea; color: var(--delay); font-size: 13px; font-weight: 600;
  }
  main { padding: 10px 14px 60px; max-width: 640px; margin: 0 auto; }
  .empty { color: var(--muted); text-align: center; padding: 48px 0; font-size: 14px; }

  .row {
    position: relative;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 78px 1fr auto;
    gap: 4px 12px;
    align-items: center;
    cursor: pointer;
  }
  .row.next-up { border-color: var(--accent); background: var(--accent-soft); box-shadow: 0 0 0 1px var(--accent); }
  .row.past { opacity: .55; }
  .time { text-align: right; }
  .time .adj { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .time .orig { font-size: 11px; color: var(--delay); text-decoration: line-through; font-variant-numeric: tabular-nums; }
  .who .rider { font-weight: 650; font-size: 15px; }
  .who .horse { font-size: 13px; color: var(--muted); }
  .meta { text-align: right; }
  .meta .phase { font-size: 13px; font-weight: 600; }
  .meta .venue { font-size: 12px; color: var(--muted); }
  .countdown { grid-column: 1 / -1; font-size: 12px; color: var(--accent); font-weight: 600; }
  .row.past .countdown { color: var(--past); font-weight: 400; }
  .row.soon:not(.next-up) { border-color: var(--soon); background: var(--soon-soft); }
  .next-tag {
    position: absolute; top: -8px; left: 10px;
    background: var(--accent); color: #fff; font-size: 10px; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase;
    padding: 1px 8px; border-radius: 999px;
  }

  /* Detail popover: shows on hover (pointer devices) or when pinned by tap/click */
  .pop {
    display: none;
    position: absolute; left: 8px; right: 8px; top: calc(100% + 4px); z-index: 10;
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 12px 14px;
    cursor: default;
  }
  .row.pinned { z-index: 11; }
  .row.pinned .pop { display: block; }
  @media (hover: hover) {
    .row:hover { z-index: 11; }
    .row:hover .pop { display: block; }
  }
  .pop h3 { margin: 0 0 2px; font-size: 14px; }
  .pop .pop-sub { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .pop table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .pop td { padding: 3px 0; vertical-align: top; }
  .pop td:first-child { color: var(--muted); padding-right: 12px; white-space: nowrap; }
  .pop .place { font-weight: 700; color: var(--accent); }
  .pop .pending { color: var(--muted); }
  .pop .results-head {
    font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--muted); padding-top: 8px;
  }
  footer { text-align: center; font-size: 11px; color: var(--muted); padding: 20px 0 30px; }
</style>
</head>
<body>

<header>
  <h1 id="event-name">Rebecca Farm — Ride Times</h1>
  <div class="sub">
    <span id="status">Loading…</span>
    <span id="fetch-err" class="err"></span>
  </div>
  <div class="days" id="days"></div>
</header>
<div id="delay-banner" class="delay-banner" hidden></div>
<main id="list"><div class="empty">Loading ride times…</div></main>
<footer>Times are event-local (Mountain). Tap a ride for details.</footer>

<script>
/* ========================================================================
   EDIT SURFACE — the only two things to change between deploys.
   ======================================================================== */

// Riders to follow. Must match the feed's "Last, First" format verbatim,
// including spelling and capitalization.
const FOLLOWING = [
  "Aulita, Brittany",    // 429 Dynamic Deluxe, 245 Ellie
  "Zook, Penelope",      // 472 Eddy
  "McMahan, Galena",     // 343 Dragon In Training
  "Corkery, Maddie",     // 501 Curlout
  "Grandia, Marc",       // 35 GHS Calexico, 46 Imhotep de Kreisker, 270 Captain Alfred
  "Yakovac, Reese",      // 147 JB Future Sharp
  "Braitling, Rebecca",  // 62 MBF Braxy V
];

// Per-venue delay in minutes (ring running behind). Edit on a weather day,
// commit, redeploy — the page picks it up on the next poll after deploy.
const DELAYS = {
  XC: 0,
  SJR1: 0,
  SJR3: 0,
  SJR4: 0,
  R1: 0,
  R2: 0,
  R3: 0,
  R4: 0,
  R5: 0,
  "Phase A": 0,
};

/* ======================================================================== */

const EVENT_ID = 1187;
const EVENT_URL = `https://scripts.showconnect.org/api/sc/event/${EVENT_ID}`;
const SCORING_URL = `${EVENT_URL}/scoringLive`;
const EVENT_TZ = "America/Denver"; // Kalispell, MT
const EVENT_POLL_MS = 20_000;
const SCORING_POLL_MS = 60_000;
const SOON_WINDOW_MIN = 30; // highlight rides within the next N minutes

const MONTHS = { Jan:0, Feb:1, Mar:2, Apr:3, May:4, Jun:5, Jul:6, Aug:7, Sep:8, Oct:9, Nov:10, Dec:11 };

// ---- Feed parsing (kept isolated: the API is unofficial and may change) ----

// RideTimes format: "Fri, Jul 17, 2026, 12:30:00 PM" (event-local, no tz).
// Returns a Date built from wall-clock components — only compare it against
// eventLocalNow(), never against raw new Date().
function parseRideTime(s) {
  const m = /^\w+, (\w+) (\d+), (\d+), (\d+):(\d+):(\d+) (AM|PM)$/.exec(s || "");
  if (!m) return null;
  const mon = MONTHS[m[1]];
  if (mon === undefined) return null;
  let h = +m[4] % 12;
  if (m[7] === "PM") h += 12;
  return new Date(+m[3], mon, +m[2], h, +m[5], +m[6]);
}

// "Now" as event-local wall clock, comparable with parseRideTime() output.
function eventLocalNow() {
  const p = {};
  for (const part of new Intl.DateTimeFormat("en-US", {
    timeZone: EVENT_TZ, year: "numeric", month: "numeric", day: "numeric",
    hour: "numeric", minute: "numeric", second: "numeric", hour12: false,
  }).formatToParts(new Date())) p[part.type] = +part.value;
  return new Date(p.year, p.month - 1, p.day, p.hour % 24, p.minute, p.second);
}

// Flatten EntryList[].RidingDetails[] into ride rows for followed riders.
// NOTE: Venues[].date/time are a publish timestamp, not the ride time —
// the schedule lives only in the RideTimes string.
function extractRides(feed) {
  const following = new Set(FOLLOWING);
  const rides = [];
  for (const e of feed.EntryList || []) {
    if (!following.has(e.RiderName)) continue;
    if (e.Status !== "Accepted") continue; // skip scratched entries
    for (const rd of e.RidingDetails || []) {
      const when = parseRideTime(rd.RideTimes); // empty = not yet scheduled
      if (!when) continue;
      rides.push({
        when,
        dayKey: `${when.getFullYear()}-${when.getMonth() + 1}-${when.getDate()}`,
        phase: rd.Phase,
        venue: (rd.Venues && rd.Venues[0] && rd.Venues[0].venue) || "",
        rider: e.RiderName,
        horse: e.HorseName,
        pinny: e.PinnyNumber,
        division: e.Division,
        divisionShort: e.DivisionShortName,
        status: e.Status,
      });
    }
  }
  return rides;
}

// Join key for results: pinny + division name (pinny is unique event-wide in
// the scoring feed, division names match the entry feed verbatim; never join
// on rider name — the two feeds format names differently).
function buildResultsIndex(scoring) {
  const divName = {};
  for (const d of scoring.DivisionsList || []) divName[d.DivisionId] = d.DivisionName;
  const idx = {};
  for (const s of scoring.ScoringList || []) {
    idx[`${s.Pinny}|${divName[s.DivisionId] || ""}`] = s;
  }
  return idx;
}

// ---- App state ----

let rides = [];
let resultsIdx = {};
let selectedDay = null;   // dayKey chosen by the user; null = auto
let lastUpdated = null;

function fmtClock(d) {
  let h = d.getHours() % 12 || 12;
  const mm = String(d.getMinutes()).padStart(2, "0");
  return `${h}:${mm} ${d.getHours() < 12 ? "AM" : "PM"}`;
}
function fmtDayLabel(dayKey, todayKey) {
  if (dayKey === todayKey) return "Today";
  const [y, m, d] = dayKey.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function adjustedTime(ride) {
  const mins = DELAYS[ride.venue] || 0;
  return { adj: new Date(ride.when.getTime() + mins * 60_000), delayMin: mins };
}

// Result cell: "--" / "" from the feed means not yet posted.
function resCell(score, place) {
  const has = v => v != null && v !== "" && v !== "--";
  if (!has(score) && !has(place)) return `<span class="pending">—</span>`;
  let out = has(score) ? esc(score) : "";
  if (has(place)) out += ` <span class="place">(${esc(place)}${ordinal(place)})</span>`;
  return out;
}
function ordinal(p) {
  const n = parseInt(p, 10);
  if (isNaN(n)) return "";
  const s = ["th", "st", "nd", "rd"], v = n % 100;
  return s[(v - 20) % 10] || s[v] || s[0];
}

function popoverHTML(ride, adj, delayMin) {
  const res = resultsIdx[`${ride.pinny}|${ride.division}`];
  let resultsRows;
  if (res) {
    resultsRows = `
      <tr><td class="results-head" colspan="2">Results</td></tr>
      <tr><td>Dressage</td><td>${resCell(res.DressageScore, res.DressagePlace)}</td></tr>
      <tr><td>Cross Country</td><td>${resCell(res.XCScore, res.XCPlace)}</td></tr>
      <tr><td>Show Jumping</td><td>${resCell(res.SJScore, res.SJPlace)}</td></tr>
      <tr><td>Overall</td><td>${resCell(res.FinalPoints, res.FinalPlace)}</td></tr>`;
  } else {
    resultsRows = `<tr><td class="results-head" colspan="2">Results</td></tr>
      <tr><td colspan="2" class="pending">Not posted yet</td></tr>`;
  }
  const timeRow = delayMin
    ? `${fmtClock(adj)} <span style="color:var(--delay)">(sched ${fmtClock(ride.when)}, +${delayMin} min ${ride.venue})</span>`
    : fmtClock(ride.when);
  return `
    <div class="pop">
      <h3>${esc(ride.rider)}</h3>
      <div class="pop-sub">${esc(ride.horse)} · #${esc(ride.pinny)}</div>
      <table>
        <tr><td>Division</td><td>${esc(ride.division)}</td></tr>
        <tr><td>${esc(ride.phase)}</td><td>${timeRow} · ${esc(ride.venue)}</td></tr>
        ${resultsRows}
      </table>
    </div>`;
}

function render() {
  const now = eventLocalNow();
  const todayKey = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;

  // Day chips: every day that has followed rides, in order.
  const dayKeys = [...new Set(rides.map(r => r.dayKey))]
    .sort((a, b) => a.split("-").map(Number) > b.split("-").map(Number) ? 1 : -1);
  let day = selectedDay && dayKeys.includes(selectedDay) ? selectedDay : null;
  if (!day) {
    // Default: today if it has rides, else the next day with rides, else the last day.
    day = dayKeys.includes(todayKey) ? todayKey
        : dayKeys.find(k => k > todayKey) || dayKeys[dayKeys.length - 1];
  }

  const daysEl = document.getElementById("days");
  daysEl.innerHTML = dayKeys.map(k =>
    `<button class="day-chip${k === day ? " active" : ""}" data-day="${k}">${fmtDayLabel(k, todayKey)}</button>`
  ).join("");
  for (const btn of daysEl.querySelectorAll(".day-chip")) {
    btn.onclick = () => { selectedDay = btn.dataset.day; render(); };
  }

  // Delay banner
  const activeDelays = Object.entries(DELAYS).filter(([, m]) => m);
  const banner = document.getElementById("delay-banner");
  banner.hidden = activeDelays.length === 0;
  banner.textContent = "Delays: " + activeDelays.map(([v, m]) => `${v} +${m} min`).join(" · ");

  // Rows for the chosen day, sorted by adjusted time.
  const dayRides = rides.filter(r => r.dayKey === day)
    .map(r => ({ ...r, ...adjustedTime(r) }))
    .sort((a, b) => a.adj - b.adj);

  const list = document.getElementById("list");
  if (dayRides.length === 0) {
    list.innerHTML = `<div class="empty">${rides.length === 0
      ? "No scheduled rides yet for the followed riders."
      : "No rides on this day for the followed riders."}</div>`;
    return;
  }

  const isToday = day === todayKey;
  let nextUpFound = false;
  list.innerHTML = dayRides.map((r, i) => {
    const minsUntil = Math.round((r.adj - now) / 60_000);
    const past = isToday && minsUntil < 0;
    const isNext = isToday && !past && !nextUpFound && (nextUpFound = true);
    const soon = isToday && !past && minsUntil <= SOON_WINDOW_MIN;
    let countdown = "";
    if (isToday) {
      countdown = past ? "done"
        : minsUntil === 0 ? "now"
        : minsUntil < 60 ? `in ${minsUntil} min`
        : `in ${Math.floor(minsUntil / 60)} h ${minsUntil % 60} min`;
    }
    return `
      <div class="row${isNext ? " next-up" : ""}${past ? " past" : ""}${soon ? " soon" : ""}" data-i="${i}">
        ${isNext ? `<div class="next-tag">Next up</div>` : ""}
        <div class="time">
          <div class="adj">${fmtClock(r.adj)}</div>
          ${r.delayMin ? `<div class="orig">${fmtClock(r.when)}</div>` : ""}
        </div>
        <div class="who">
          <div class="rider">${esc(r.rider)}</div>
          <div class="horse">${esc(r.horse)}</div>
        </div>
        <div class="meta">
          <div class="phase">${esc(r.phase)}</div>
          <div class="venue">${esc(r.venue)}${r.divisionShort ? " · " + esc(r.divisionShort) : ""}</div>
        </div>
        ${countdown ? `<div class="countdown">${countdown}</div>` : ""}
        ${popoverHTML(r, r.adj, r.delayMin)}
      </div>`;
  }).join("");

  // Tap/click pins the popover open (hover already shows it on desktop).
  for (const rowEl of list.querySelectorAll(".row")) {
    rowEl.addEventListener("click", ev => {
      if (ev.target.closest(".pop")) return;
      const wasPinned = rowEl.classList.contains("pinned");
      for (const other of list.querySelectorAll(".row.pinned")) other.classList.remove("pinned");
      if (!wasPinned) rowEl.classList.add("pinned");
    });
  }

  document.getElementById("status").textContent = lastUpdated
    ? `Updated ${fmtClock(lastUpdated)} · ${FOLLOWING.length} riders followed`
    : "";
}

// ---- Polling (fail-soft: keep showing the last good data on errors) ----

async function fetchEventFeed() {
  try {
    const resp = await fetch(EVENT_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    rides = extractRides(await resp.json());
    lastUpdated = eventLocalNow();
    document.getElementById("fetch-err").textContent = "";
  } catch (e) {
    document.getElementById("fetch-err").textContent = "· update failed, retrying";
  }
  render();
}

async function fetchScoring() {
  try {
    const resp = await fetch(SCORING_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    resultsIdx = buildResultsIndex(await resp.json());
    render();
  } catch (e) { /* results are a nicety; ignore failures */ }
}

fetchEventFeed();
fetchScoring();
setInterval(fetchEventFeed, EVENT_POLL_MS);
setInterval(fetchScoring, SCORING_POLL_MS);
setInterval(render, 30_000); // keep countdowns fresh between fetches
</script>
</body>
</html>
