<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rebecca Farm — Ride Times</title>
<style>
  :root {
    --bg: #f6f5f2;
    --card: #ffffff;
    --ink: #1c1c1c;
    --muted: #6b6b6b;
    --line: #e3e1dc;
    --accent: #1a6b3c;
    --accent-soft: #e6f2ea;
    --soon: #b45309;
    --soon-soft: #fdf1e0;
    --past: #a3a3a3;
    --delay: #b91c1c;
    --shadow: 0 10px 30px rgba(0,0,0,.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.4;
    -webkit-text-size-adjust: 100%;
  }
  header {
    position: sticky; top: 0; z-index: 20;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    padding: 10px 14px 8px;
  }
  h1 { font-size: 17px; margin: 0; font-weight: 700; letter-spacing: -.01em; }
  .sub { font-size: 12px; color: var(--muted); margin-top: 1px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .sub .err { color: var(--delay); }
  .days { display: flex; gap: 6px; margin-top: 8px; overflow-x: auto; padding-bottom: 2px; }
  .day-chip {
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    border-radius: 999px; padding: 4px 12px; font-size: 13px; white-space: nowrap;
    cursor: pointer; font-family: inherit;
  }
  .day-chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .delay-banner {
    margin: 10px 14px 0; padding: 8px 12px; border-radius: 10px;
    background: #fdeaea; color: var(--delay); font-size: 13px; font-weight: 600;
  }
  main { padding: 10px 14px 60px; max-width: 640px; margin: 0 auto; }
  .empty { color: var(--muted); text-align: center; padding: 48px 0; font-size: 14px; }

  .row {
    position: relative;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 12px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 78px 1fr auto;
    gap: 4px 12px;
    align-items: center;
    cursor: pointer;
  }
  .row.next-up { border-color: var(--accent); background: var(--accent-soft); box-shadow: 0 0 0 1px var(--accent); }
  .row.past { opacity: .55; }
  .row.past.pinned { opacity: 1; }
  @media (hover: hover) { .row.past:hover { opacity: 1; } }
  .row.out { opacity: .75; }
  .row.out.pinned { opacity: 1; }
  @media (hover: hover) { .row.out:hover { opacity: 1; } }
  .row.out .countdown { color: var(--muted); }
  .time { text-align: right; }
  .time .adj { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .time .orig { font-size: 11px; color: var(--delay); text-decoration: line-through; font-variant-numeric: tabular-nums; }
  .who .rider { font-weight: 650; font-size: 15px; }
  .who .horse { font-size: 13px; color: var(--muted); }
  .who .horse b { font-weight: 650; color: var(--ink); }
  .meta { text-align: right; }
  .meta .phase { font-size: 13px; font-weight: 600; }
  .meta .venue { font-size: 12px; color: var(--muted); }
  .countdown { grid-column: 1 / -1; font-size: 12px; color: var(--accent); font-weight: 600; }
  .now-line { display: flex; align-items: center; gap: 8px; margin: 10px 2px; color: var(--delay); font-size: 11px; font-weight: 700; letter-spacing: .03em; }
  .now-line::before, .now-line::after { content: ""; flex: 1; border-top: 2px solid var(--delay); }
  .row.extra { border-style: dashed; background: transparent; cursor: default; }
  .row.extra.next-up { background: var(--accent-soft); }
  .est { grid-column: 1 / -1; font-size: 12px; color: var(--muted); }
  .est b { font-weight: 650; color: var(--ink); }
  .row.past .countdown, .countdown.done { color: var(--past); font-weight: 400; }
  .row.soon:not(.next-up) { border-color: var(--soon); background: var(--soon-soft); }
  .next-tag {
    position: absolute; top: -8px; left: 10px;
    background: var(--accent); color: #fff; font-size: 10px; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase;
    padding: 1px 8px; border-radius: 999px;
  }

  /* Detail popover: shows on hover (pointer devices) or when pinned by tap/click */
  .pop {
    display: none;
    position: absolute; left: 8px; right: 8px; top: calc(100% + 4px); z-index: 10;
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 12px 14px;
    cursor: default;
  }
  .row.pinned { z-index: 11; }
  .row.pinned .pop { display: block; }
  @media (hover: hover) {
    .row:hover { z-index: 11; }
    .row:hover .pop { display: block; }
  }
  .pop h3 { margin: 0 0 2px; font-size: 14px; }
  .pop .pop-sub { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .pop table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .pop td { padding: 3px 0; vertical-align: top; }
  .pop td:first-child { color: var(--muted); padding-right: 12px; white-space: nowrap; }
  .pop .place { font-weight: 700; color: var(--accent); }
  .pop .pending { color: var(--muted); }
  .pop .results-head {
    font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    color: var(--muted); padding-top: 8px;
  }
  footer { text-align: center; font-size: 11px; color: var(--muted); padding: 20px 0 30px; }
  #now-btn {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; border: none; border-radius: 999px;
    padding: 8px 18px; font-size: 13px; font-weight: 600; font-family: inherit;
    box-shadow: var(--shadow); cursor: pointer; z-index: 30; opacity: .92;
  }
  #now-btn[hidden] { display: none; }
  .linklike { border: none; background: none; color: var(--accent); font-size: 12px; font-weight: 600; padding: 0; cursor: pointer; font-family: inherit; }
  #rider-sheet { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 40; display: flex; align-items: flex-end; }
  #rider-sheet[hidden] { display: none; }
  .sheet-card {
    background: var(--card); width: 100%; max-width: 640px; margin: 0 auto;
    border-radius: 16px 16px 0 0; padding: 14px 16px 28px;
    max-height: 75vh; overflow-y: auto;
  }
  .sheet-head { display: flex; justify-content: space-between; align-items: center; font-size: 15px; }
  #sheet-close { border: none; background: none; font-size: 17px; cursor: pointer; color: var(--muted); padding: 4px 8px; }
  .sheet-sub { font-size: 12px; color: var(--muted); margin: 4px 0 8px; }
  #rider-search { width: 100%; box-sizing: border-box; padding: 10px 12px; font-size: 16px; border: 1px solid var(--line); border-radius: 10px; margin: 10px 0 4px; font-family: inherit; }
  .rrow { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .rrow small { color: var(--muted); }
  .rbtn { border: 1px solid var(--line); background: var(--card); border-radius: 999px; padding: 4px 12px; font-size: 13px; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .rbtn.add { background: var(--accent); border-color: var(--accent); color: #fff; }
  .rbtn.rm { color: var(--delay); }
  .rtag { font-size: 12px; color: var(--muted); white-space: nowrap; }
</style>
</head>
<body>

<header>
  <h1 id="event-name">Rebecca Farm — Ride Times</h1>
  <div class="sub">
    <span id="status">Loading…</span>
    <span id="fetch-err" class="err"></span>
    <button id="edit-riders" class="linklike">＋ my riders</button>
  </div>
  <div class="days" id="days"></div>
</header>
<div id="delay-banner" class="delay-banner" hidden></div>
<main id="list"><div class="empty">Loading ride times…</div></main>
<footer>Times are event-local (Mountain). Tap a ride for details.</footer>
<button id="now-btn" hidden>now</button>

<div id="rider-sheet" hidden>
  <div class="sheet-card">
    <div class="sheet-head"><b>My riders</b><button id="sheet-close" aria-label="Close">✕</button></div>
    <div class="sheet-sub">Riders you add here are saved on this phone only — everyone else's page is unaffected.</div>
    <div id="my-riders-list"></div>
    <input id="rider-search" placeholder="Search rider name…" autocomplete="off">
    <div id="rider-results"></div>
  </div>
</div>

<script>
/* ========================================================================
   EDIT SURFACE — the only two things to change between deploys.
   ======================================================================== */

// Riders to follow. Must match the feed's "Last, First" format verbatim,
// including spelling and capitalization.
const FOLLOWING = [
  "Aulita, Brittany",    // 429 Dynamic Deluxe, 245 Ellie
  "Zook, Penelope",      // 472 Eddy
  "McMahan, Galena",     // 343 Dragon In Training
  "Corkery, Maddie",     // 501 Curlout
  "Grandia, Marc",       // 35 GHS Calexico, 46 Imhotep de Kreisker, 270 Captain Alfred
  "Yakovac, Reese",      // 147 JB Future Sharp
  "Braitling, Rebecca",  // 62 MBF Braxy V
  "Goodman, Stephanie",  // 4 Elwenda DP, 10 Korella vd Watermolen, 41 Diranca, 70 Cord Johnson
  "Crocker, Shelby",     // 192 Sportsfield Harley Davis, 441 LS Chez Bond
];

// Per-venue delay in minutes (ring running behind). Edit on a weather day,
// commit, redeploy — the page picks it up on the next poll after deploy.
// Delays apply ONLY to rides on this date (event-local), so other days'
// times are never shifted. On a new weather day, update this date along
// with the numbers below.
const DELAY_DATE = "2026-07-17";

// Fri Jul 17: SJ ~1h30; FEI dressage (R1) 1h; HT dressage (R2/R3) 1h30.
const DELAYS = {
  XC: 0, // Friday XC was fully re-ordered — revised times live in OVERRIDES below
  SJR1: 0,
  SJR3: 0,
  SJR4: 90,
  R1: 60,
  R2: 90,
  R3: 90,
  R4: 0,
  R5: 0,
  "Phase A": 0,
};

// Exact revised times from official order-of-go sheets, when a ring is
// re-ordered rather than uniformly delayed. An override replaces the feed's
// scheduled time for that horse+phase (venue delays are NOT added on top).
// Remove entries once the feed catches up or the day is over.
const OVERRIDES = [
  // Friday XC revised order of go (xcfriREVISED.pdf):
  { pinny: 245, phase: "Cross Country", date: "2026-07-17", time: "4:40 PM" }, // Aulita / Ellie
  { pinny: 192, phase: "Cross Country", date: "2026-07-17", time: "5:42 PM" }, // Crocker / Sportsfield Harley Davis
  { pinny: 270, phase: "Cross Country", date: "2026-07-17", time: "6:16 PM" }, // Grandia / Captain Alfred
  // Friday SJ Ring 4 Beginner Novice block starts (sjring4friBN.pdf):
  { pinny: 441, phase: "Show Jumping", date: "2026-07-17", time: "4:25 PM" }, // Crocker / LS Chez Bond (JOBNA start)
  { pinny: 472, phase: "Show Jumping", date: "2026-07-17", time: "5:45 PM" }, // Zook / Eddy (JOBNC start)
];

// Estimated individual slot within an SJ block: block start + ~2 min per
// rider ahead in the printed order of go, skipping riders marked E/R/RF/W
// (out of the competition, unlikely to start). Shown as secondary info
// only — the main time stays the official block start.
// SJ slots are also estimated automatically from live standings (order of
// go is reverse of placing); entries here come from official printed
// order-of-go sheets and take precedence over the automatic estimate.
const ESTIMATES = [
  // Observed: #337 (10th in JONB order) started 2:15 → Galena anchored from there.
  { pinny: 343, phase: "Show Jumping", date: "2026-07-17", time: "2:21 PM", note: "13th of 17 to jump" }, // McMahan (JONB)
  { pinny: 441, phase: "Show Jumping", date: "2026-07-17", time: "4:47 PM", note: "12th of 13 to jump" }, // Crocker (JOBNA)
  { pinny: 472, phase: "Show Jumping", date: "2026-07-17", time: "5:49 PM", note: "3rd of 12 to jump" },  // Zook (JOBNC)
  // Saturday SJ Ring 4 order of go (sjring4satBN.pdf), SOBNA block starts 8:30:
  { pinny: 501, phase: "Show Jumping", date: "2026-07-18", time: "8:40 AM", note: "6th of 14 to jump" },  // Corkery (SOBNA)
];

// One-off schedule items (course walks, etc.) shown inline in the timeline
// at their start time, alongside the rides.
const EXTRAS = [
  { date: "2026-07-17", time: "3:25 PM", title: "Beginner Novice course walk",
    detail: "3:25–3:55 PM · Ring 4, then water & drag until 4:25 — Shelby & Penelope's divisions" },
];

/* ======================================================================== */

const EVENT_ID = 1187;
const EVENT_URL = `https://scripts.showconnect.org/api/sc/event/${EVENT_ID}`;
const SCORING_URL = `${EVENT_URL}/scoringLive`;
const EVENT_TZ = "America/Denver"; // Kalispell, MT
const EVENT_POLL_MS = 20_000;
const SCORING_POLL_MS = 60_000;
const DEPLOY_POLL_MS = 60_000;
const SOON_WINDOW_MIN = 30; // highlight rides within the next N minutes
const PAST_GRACE_MIN = 10;  // keep a row active this long past its (estimated) time

const MONTHS = { Jan:0, Feb:1, Mar:2, Apr:3, May:4, Jun:5, Jul:6, Aug:7, Sep:8, Oct:9, Nov:10, Dec:11 };

// ---- Feed parsing (kept isolated: the API is unofficial and may change) ----

// RideTimes format: "Fri, Jul 17, 2026, 12:30:00 PM" (event-local, no tz).
// Returns a Date built from wall-clock components — only compare it against
// eventLocalNow(), never against raw new Date().
function parseRideTime(s) {
  const m = /^\w+, (\w+) (\d+), (\d+), (\d+):(\d+):(\d+) (AM|PM)$/.exec(s || "");
  if (!m) return null;
  const mon = MONTHS[m[1]];
  if (mon === undefined) return null;
  let h = +m[4] % 12;
  if (m[7] === "PM") h += 12;
  return new Date(+m[3], mon, +m[2], h, +m[5], +m[6]);
}

// "Now" as event-local wall clock, comparable with parseRideTime() output.
function eventLocalNow() {
  const p = {};
  for (const part of new Intl.DateTimeFormat("en-US", {
    timeZone: EVENT_TZ, year: "numeric", month: "numeric", day: "numeric",
    hour: "numeric", minute: "numeric", second: "numeric", hour12: false,
  }).formatToParts(new Date())) p[part.type] = +part.value;
  return new Date(p.year, p.month - 1, p.day, p.hour % 24, p.minute, p.second);
}

// Parse a config {date: "2026-07-17", time: "4:40 PM"} to a wall-clock Date.
function parseConfigTime(o) {
  const [y, mo, d] = o.date.split("-").map(Number);
  const t = /^(\d+):(\d+)\s*(AM|PM)$/i.exec(o.time.trim());
  if (!t) return null;
  let h = +t[1] % 12;
  if (t[3].toUpperCase() === "PM") h += 12;
  return new Date(y, mo - 1, d, h, +t[2], 0);
}

// Overrides and estimates indexed by pinny+phase.
const OVERRIDE_IDX = {};
for (const o of OVERRIDES) {
  const when = parseConfigTime(o);
  if (when) OVERRIDE_IDX[`${o.pinny}|${o.phase}`] = when;
}
const EST_IDX = {};
for (const o of ESTIMATES) {
  const when = parseConfigTime(o);
  if (when) EST_IDX[`${o.pinny}|${o.phase}`] = { when, note: o.note };
}

// Per-browser edits to the follow list. FOLLOWING is just the pre-populated
// default: additions and removals are both stored locally, so each phone
// can shape its own list while shared-list updates still flow through.
const MY_RIDERS_KEY = "rf2026:myRiders";
const HIDDEN_RIDERS_KEY = "rf2026:hiddenRiders";
function getStoredList(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; } catch (e) { return []; }
}
function setStoredList(key, list) {
  try { localStorage.setItem(key, JSON.stringify(list)); } catch (e) { /* blocked */ }
}
const getMyRiders = () => getStoredList(MY_RIDERS_KEY);
const getHiddenRiders = () => getStoredList(HIDDEN_RIDERS_KEY);
function effectiveFollowing() {
  const hidden = new Set(getHiddenRiders());
  return [...FOLLOWING.filter(n => !hidden.has(n)), ...getMyRiders()];
}

// All accepted riders in the feed, for the "my riders" search picker.
let allRiders = [];
function buildRiderIndex(feed) {
  const m = new Map();
  for (const e of feed.EntryList || []) {
    if (e.Status !== "Accepted" || !e.RiderName) continue;
    if (!m.has(e.RiderName)) m.set(e.RiderName, []);
    m.get(e.RiderName).push(e.HorseName);
  }
  allRiders = [...m.entries()].map(([name, horses]) => ({ name, horses }))
    .sort((a, b) => a.name.localeCompare(b.name));
}

// Flatten EntryList[].RidingDetails[] into ride rows for followed riders.
// NOTE: Venues[].date/time are a publish timestamp, not the ride time —
// the schedule lives only in the RideTimes string.
function extractRides(feed) {
  const following = new Set(effectiveFollowing());
  followedCount = following.size;
  // Divisions whose SJ times are a shared block-start placeholder (in this
  // feed that's all of them, but verify rather than assume).
  const sjTimes = {};
  for (const e of feed.EntryList || []) {
    if (e.Status !== "Accepted") continue;
    for (const rd of e.RidingDetails || []) {
      if (rd.Phase === "Show Jumping" && rd.RideTimes)
        (sjTimes[e.Division] = sjTimes[e.Division] || []).push(rd.RideTimes);
    }
  }
  sjBlockDivs = new Set(Object.keys(sjTimes).filter(d =>
    sjTimes[d].length > 1 && new Set(sjTimes[d]).size === 1));
  const rides = [];
  for (const e of feed.EntryList || []) {
    if (!following.has(e.RiderName)) continue;
    if (e.Status !== "Accepted") continue; // skip scratched entries
    for (const rd of e.RidingDetails || []) {
      const when = parseRideTime(rd.RideTimes); // empty = not yet scheduled
      if (!when) continue;
      const override = OVERRIDE_IDX[`${e.PinnyNumber}|${rd.Phase}`] || null;
      rides.push({
        when,
        override,
        est: EST_IDX[`${e.PinnyNumber}|${rd.Phase}`] || null,
        dayKey: isoDay(override || when), // an override can move a ride's day
        phase: rd.Phase,
        venue: (rd.Venues && rd.Venues[0] && rd.Venues[0].venue) || "",
        rider: e.RiderName,
        horse: e.HorseName,
        pinny: e.PinnyNumber,
        division: e.Division,
        divisionShort: e.DivisionShortName,
        status: e.Status,
      });
    }
  }
  return rides;
}

// Join key for results: pinny + division name (pinny is unique event-wide in
// the scoring feed, division names match the entry feed verbatim; never join
// on rider name — the two feeds format names differently).
function buildResultsIndex(scoring) {
  const divName = {};
  for (const d of scoring.DivisionsList || []) divName[d.DivisionId] = d.DivisionName;
  const idx = {};
  scoringByDiv = {};
  for (const s of scoring.ScoringList || []) {
    const dn = divName[s.DivisionId] || "";
    idx[`${s.Pinny}|${dn}`] = s;
    (scoringByDiv[dn] = scoringByDiv[dn] || []).push(s);
  }
  return idx;
}

// ---- App state ----

let rides = [];
let resultsIdx = {};
let selectedDay = null;   // dayKey chosen by the user; null = auto
let lastUpdatedMs = null; // epoch ms of last good event fetch (or cache stamp)
let lastFeed = null;      // last good feed, for re-filtering after my-riders edits
let followedCount = FOLLOWING.length;
let scoringByDiv = {};    // DivisionName -> scoring rows, for slot estimates
let sjBlockDivs = new Set(); // divisions whose SJ time is a shared block start

// Last good payloads survive reloads on bad signal (spotty venue cell
// service): render cached data instantly, stamped with its age, while
// fetches retry in the background.
const CACHE_EVENT = "rf2026:event";
const CACHE_SCORING = "rf2026:scoring";
function cachePut(key, value) {
  try { localStorage.setItem(key, JSON.stringify({ at: Date.now(), value })); } catch (e) { /* full/blocked */ }
}
function cacheGet(key) {
  try { return JSON.parse(localStorage.getItem(key)); } catch (e) { return null; }
}
function clockInEventTz(ms) {
  return new Intl.DateTimeFormat("en-US", { timeZone: EVENT_TZ, hour: "numeric", minute: "2-digit" }).format(new Date(ms));
}

function isoDay(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function fmtClock(d) {
  let h = d.getHours() % 12 || 12;
  const mm = String(d.getMinutes()).padStart(2, "0");
  return `${h}:${mm} ${d.getHours() < 12 ? "AM" : "PM"}`;
}
function fmtDayLabel(dayKey, todayKey) {
  if (dayKey === todayKey) return "Today";
  const [y, m, d] = dayKey.split("-").map(Number);
  return new Date(y, m - 1, d).toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

let initialScrollDone = false;

// Floating "now" button: visible only when the now-line is off-screen,
// with an arrow for which way it is. Clicking scrolls back to it.
function updateNowBtn() {
  const btn = document.getElementById("now-btn");
  const el = document.querySelector(".now-line");
  if (!el) { btn.hidden = true; return; }
  const r = el.getBoundingClientRect();
  const headerBottom = document.querySelector("header").getBoundingClientRect().bottom;
  const above = r.bottom < headerBottom + 8;
  const below = r.top > window.innerHeight - 8;
  btn.hidden = !(above || below);
  if (!btn.hidden) btn.textContent = above ? "↑ now" : "↓ now";
}

// Non-numeric FinalPlace codes in the scoring feed mean the combo is out
// of the competition and not expected at later phases.
const OUT_WORDS = {
  E: "eliminated", IE: "eliminated", TE: "eliminated",
  R: "retired", MR: "retired", RF: "rider fall", W: "withdrawn", IW: "withdrawn",
};
function outStatus(ride) {
  const res = resultsIdx[`${ride.pinny}|${ride.division}`];
  return (res && OUT_WORDS[(res.FinalPlace || "").trim()]) || null;
}

// For a completed ride, the combo's next ride from NOW (not from this
// ride's slot — an in-between phase may already be done too), so a done
// line says what's actually still coming.
const PHASE_SHORT = { "Cross Country": "XC", "Show Jumping": "SJ" };
function nextRideInfo(ride, now) {
  const timeOf = o => o.override || o.when;
  let best = null;
  for (const o of rides) {
    if (o.pinny !== ride.pinny || timeOf(o) <= now) continue;
    if (!best || timeOf(o) < timeOf(best)) best = o;
  }
  if (!best) return null;
  const t = timeOf(best);
  const day = isoDay(t) === isoDay(now) ? "" :
    t.toLocaleDateString("en-US", { weekday: "short" }) + " ";
  return `next: ${PHASE_SHORT[best.phase] || best.phase} ${day}${fmtClock(t)}`;
}

// Places for a completed ride, from the scoring join. The phase label
// binds the place to this specific ride; the overall wording says whether
// the combo is still competing ("currently") or finished ("finished").
const PHASE_PLACE_FIELD = { "Dressage": "DressagePlace", "Cross Country": "XCPlace", "Show Jumping": "SJPlace" };
function donePlaces(ride, isFinal) {
  const res = resultsIdx[`${ride.pinny}|${ride.division}`];
  if (!res) return { phase: null, overall: null };
  const pp = parseInt(res[PHASE_PLACE_FIELD[ride.phase]], 10);
  const op = parseInt(res.FinalPlace, 10);
  return {
    phase: pp ? `${PHASE_SHORT[ride.phase] || ride.phase} ${pp}${ordinal(pp)}` : null,
    overall: op ? `${isFinal ? "finished" : "currently"} ${op}${ordinal(op)} overall` : null,
  };
}

// Automatic SJ slot estimate from live standings: order of go is reverse of
// placing, so slot = block start + ~2 min per still-competing combo placed
// below this one. Recomputed on every scoring poll, so it self-corrects as
// earlier phases finish. `base` is the delay-adjusted block start.
const SJ_PACE_MIN = 2;
function autoEstimate(ride, base) {
  if (ride.phase !== "Show Jumping" || !sjBlockDivs.has(ride.division)) return null;
  const rows = scoringByDiv[ride.division] || [];
  const mine = rows.find(s => s.Pinny === ride.pinny);
  const myPlace = parseInt(mine && mine.FinalPlace, 10);
  if (isNaN(myPlace)) return null;
  const actives = rows.filter(s => !isNaN(parseInt(s.FinalPlace, 10)));
  const ahead = actives.filter(s => parseInt(s.FinalPlace, 10) > myPlace).length;
  const n = ahead + 1;
  return {
    when: new Date(base.getTime() + ahead * SJ_PACE_MIN * 60_000),
    note: `${n}${ordinal(n)} of ${actives.length} to jump, by standing`,
  };
}

function adjustedTime(ride) {
  if (ride.override) {
    return { adj: ride.override, delayMin: 0, revised: +ride.override !== +ride.when };
  }
  const mins = ride.dayKey === DELAY_DATE ? DELAYS[ride.venue] || 0 : 0;
  return { adj: new Date(ride.when.getTime() + mins * 60_000), delayMin: mins, revised: false };
}

// Result cell: "--" / "" from the feed means not yet posted.
function resCell(score, place) {
  const has = v => v != null && v !== "" && v !== "--";
  if (!has(score) && !has(place)) return `<span class="pending">—</span>`;
  let out = has(score) ? esc(score) : "";
  if (has(place)) out += ` <span class="place">(${esc(place)}${ordinal(place)})</span>`;
  return out;
}
function ordinal(p) {
  const n = parseInt(p, 10);
  if (isNaN(n)) return "";
  const s = ["th", "st", "nd", "rd"], v = n % 100;
  return s[(v - 20) % 10] || s[v] || s[0];
}

function popoverHTML(ride, adj, delayMin) {
  const res = resultsIdx[`${ride.pinny}|${ride.division}`];
  let resultsRows;
  if (res) {
    resultsRows = `
      <tr><td class="results-head" colspan="2">Results</td></tr>
      <tr><td>Dressage</td><td>${resCell(res.DressageScore, res.DressagePlace)}</td></tr>
      <tr><td>Cross Country</td><td>${resCell(res.XCScore, res.XCPlace)}</td></tr>
      <tr><td>Show Jumping</td><td>${resCell(res.SJScore, res.SJPlace)}</td></tr>
      <tr><td>Overall</td><td>${resCell(res.FinalPoints, res.FinalPlace)}</td></tr>`;
  } else {
    resultsRows = `<tr><td class="results-head" colspan="2">Results</td></tr>
      <tr><td colspan="2" class="pending">Not posted yet</td></tr>`;
  }
  const timeRow = ride.revised
    ? `${fmtClock(adj)} <span style="color:var(--delay)">(revised; sched ${fmtClock(ride.when)})</span>`
    : delayMin
    ? `${fmtClock(adj)} <span style="color:var(--delay)">(sched ${fmtClock(ride.when)}, +${delayMin} min ${ride.venue})</span>`
    : fmtClock(ride.when);
  return `
    <div class="pop">
      <h3>${esc(ride.rider)}</h3>
      <div class="pop-sub">${esc(ride.horse)} · #${esc(ride.pinny)}</div>
      <table>
        <tr><td>Division</td><td>${esc(ride.division)}</td></tr>
        <tr><td>${esc(ride.phase)}</td><td>${timeRow} · ${esc(ride.venue)}</td></tr>
        ${ride.est ? `<tr><td>Est. slot</td><td>~${fmtClock(ride.est.when)} (${esc(ride.est.note)})</td></tr>` : ""}
        ${resultsRows}
      </table>
    </div>`;
}

function render() {
  const now = eventLocalNow();
  const todayKey = isoDay(now);

  // Day chips: every day that has followed rides, in order.
  const dayKeys = [...new Set(rides.map(r => r.dayKey))].sort();
  let day = selectedDay && dayKeys.includes(selectedDay) ? selectedDay : null;
  if (!day) {
    // Default: today if it has rides, else the next day with rides, else the last day.
    day = dayKeys.includes(todayKey) ? todayKey
        : dayKeys.find(k => k > todayKey) || dayKeys[dayKeys.length - 1];
  }

  const daysEl = document.getElementById("days");
  daysEl.innerHTML = dayKeys.map(k =>
    `<button class="day-chip${k === day ? " active" : ""}" data-day="${k}">${fmtDayLabel(k, todayKey)}</button>`
  ).join("");
  for (const btn of daysEl.querySelectorAll(".day-chip")) {
    btn.onclick = () => { selectedDay = btn.dataset.day; render(); };
  }

  // Delay banner — only when viewing the day the delays apply to.
  const activeDelays = Object.entries(DELAYS).filter(([, m]) => m);
  const banner = document.getElementById("delay-banner");
  banner.hidden = activeDelays.length === 0 || day !== DELAY_DATE;
  banner.textContent = "Delays: " + activeDelays.map(([v, m]) => `${v} +${m} min`).join(" · ");

  // Rows for the chosen day — rides plus one-off extras — sorted by time.
  const dayRides = rides.filter(r => r.dayKey === day)
    .map(r => ({ ...r, ...adjustedTime(r) }));
  for (const x of EXTRAS) {
    const adj = parseConfigTime(x);
    if (adj && isoDay(adj) === day) dayRides.push({ extra: true, adj, title: x.title, detail: x.detail });
  }
  dayRides.sort((a, b) => a.adj - b.adj);

  const list = document.getElementById("list");
  if (dayRides.length === 0) {
    list.innerHTML = `<div class="empty">${rides.length === 0
      ? "No scheduled rides yet for the followed riders."
      : "No rides on this day for the followed riders."}</div>`;
    return;
  }

  const isToday = day === todayKey;
  let nextUpFound = false;
  const rowsHTML = dayRides.map((r, i) => {
    const minsUntil = Math.round((r.adj - now) / 60_000);
    // Slot estimate: a manual entry from a printed order-of-go sheet wins;
    // otherwise compute one from live standings.
    if (!(r.est && isoDay(r.est.when) === r.dayKey)) {
      r.est = r.extra ? null : autoEstimate(r, r.adj);
    }
    // A row isn't "done" at its listed time: an SJ block runs until the
    // rider's estimated slot, and any ride takes a few minutes — so keep
    // rows active until (estimate ?? time) + grace.
    const activeUntil = (r.est ? r.est.when : r.adj).getTime()
      + PAST_GRACE_MIN * 60_000;
    const isPastDay = day < todayKey;
    const past = isPastDay || (isToday && now.getTime() > activeUntil);
    const out = r.extra ? null : outStatus(r);
    const isNext = isToday && !past && !out && !nextUpFound && (nextUpFound = true);
    const nextTag = minsUntil <= 0 ? "Now" : "Next up";
    const soon = isToday && !past && !out && minsUntil <= SOON_WINDOW_MIN;
    let countdown = "";
    if (past) {
      if (r.extra) {
        countdown = "";
      } else {
        // ✓ marks the ride completed; then this ride's place, the combo's
        // standing (worded "currently"/"finished"), then out status or the
        // next ride when there is one.
        const nxt = out ? null : nextRideInfo(r, now);
        const p = donePlaces(r, !out && !nxt);
        const bits = [p.phase, p.overall].filter(Boolean);
        if (out) {
          // e.g. "✓ Dressage 14th · withdrawn", or just "eliminated" when
          // this is the ride where it happened (no result to check off).
          countdown = bits.length ? `✓ ${bits.join(" · ")} · ${out}` : out;
        } else {
          if (!bits.length) bits.push("scores pending");
          if (nxt) bits.push(nxt);
          else if (!p.overall) bits.push("event complete");
          countdown = "✓ " + bits.join(" · ");
        }
      }
    } else if (out) {
      countdown = out;
    } else if (isToday) {
      countdown = minsUntil <= 0 ? "underway"
        : minsUntil < 60 ? `in ${minsUntil} min`
        : `in ${Math.floor(minsUntil / 60)} h ${minsUntil % 60} min`;
    }
    if (r.extra) {
      return `
        <div class="row extra${isNext ? " next-up" : ""}${past ? " past" : ""}">
          ${isNext ? `<div class="next-tag">${nextTag}</div>` : ""}
          <div class="time"><div class="adj">${fmtClock(r.adj)}</div></div>
          <div class="who" style="grid-column: 2 / -1">
            <div class="rider">${esc(r.title)}</div>
            <div class="horse">${esc(r.detail)}</div>
          </div>
          ${countdown ? `<div class="countdown">${countdown}</div>` : ""}
        </div>`;
    }
    return `
      <div class="row${isNext ? " next-up" : ""}${past && !isPastDay ? " past" : ""}${soon ? " soon" : ""}${out && !past ? " out" : ""}" data-i="${i}">
        ${isNext ? `<div class="next-tag">${nextTag}</div>` : ""}
        <div class="time">
          <div class="adj">${fmtClock(r.adj)}</div>
          ${r.delayMin || r.revised ? `<div class="orig">${fmtClock(r.when)}</div>` : ""}
        </div>
        <div class="who">
          <div class="rider">${esc(r.rider)}</div>
          <div class="horse">${esc(r.horse)}${r.pinny != null ? ` · <b>#${esc(r.pinny)}</b>` : ""}</div>
        </div>
        <div class="meta">
          <div class="phase">${esc(r.phase)}</div>
          <div class="venue">${esc(r.venue)}${r.divisionShort ? " · " + esc(r.divisionShort) : ""}</div>
        </div>
        ${countdown ? `<div class="countdown${past ? " done" : ""}">${countdown}</div>` : ""}
        ${r.est && !past ? `<div class="est">est. slot <b>~${fmtClock(r.est.when)}</b> · ${esc(r.est.note)}</div>` : ""}
        ${popoverHTML(r, r.adj, r.delayMin)}
      </div>`;
  });

  // "Now" marker: a thin line at the current time, today only.
  if (isToday) {
    let at = dayRides.findIndex(r => r.adj - now >= 0);
    if (at === -1) at = dayRides.length;
    rowsHTML.splice(at, 0, `<div class="now-line"><span>now · ${fmtClock(now)}</span></div>`);
  }
  list.innerHTML = rowsHTML.join("");

  // Land on "now" once, at first render of today's list. Never afterwards —
  // re-renders and data refreshes must not move the screen under the user;
  // the floating button is the deliberate way back.
  if (!initialScrollDone && isToday) {
    const el = document.querySelector(".now-line");
    if (el) {
      el.scrollIntoView({ block: "center" });
      initialScrollDone = true;
    }
  }
  updateNowBtn();

  // Tap/click pins the popover open (hover already shows it on desktop).
  for (const rowEl of list.querySelectorAll(".row")) {
    rowEl.addEventListener("click", ev => {
      if (ev.target.closest(".pop")) return;
      const wasPinned = rowEl.classList.contains("pinned");
      for (const other of list.querySelectorAll(".row.pinned")) other.classList.remove("pinned");
      if (!wasPinned) rowEl.classList.add("pinned");
    });
  }

  let statusText = "";
  if (lastUpdatedMs) {
    const ageMin = Math.round((Date.now() - lastUpdatedMs) / 60_000);
    statusText = ageMin >= 2
      ? `Showing data from ${clockInEventTz(lastUpdatedMs)} (${ageMin < 60 ? ageMin + " min" : Math.round(ageMin / 60) + " h"} old)`
      : `Updated ${clockInEventTz(lastUpdatedMs)} · ${followedCount} riders followed`;
  }
  document.getElementById("status").textContent = statusText;
}

// ---- Polling (fail-soft: keep showing the last good data on errors) ----

async function fetchEventFeed() {
  try {
    const resp = await fetch(EVENT_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const feed = await resp.json();
    lastFeed = feed;
    buildRiderIndex(feed);
    rides = extractRides(feed);
    lastUpdatedMs = Date.now();
    cachePut(CACHE_EVENT, feed);
    document.getElementById("fetch-err").textContent = "";
  } catch (e) {
    document.getElementById("fetch-err").textContent = "· can't reach ShowConnect, retrying";
  }
  render();
}

async function fetchScoring() {
  try {
    const resp = await fetch(SCORING_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const scoring = await resp.json();
    resultsIdx = buildResultsIndex(scoring);
    cachePut(CACHE_SCORING, scoring);
    render();
  } catch (e) { /* results are a nicety; ignore failures */ }
}

// Hydrate from cache so the page is useful immediately, even fully offline.
{
  const ev = cacheGet(CACHE_EVENT);
  if (ev && ev.value) {
    lastFeed = ev.value;
    buildRiderIndex(ev.value);
    rides = extractRides(ev.value);
    lastUpdatedMs = ev.at;
  }
  const sc = cacheGet(CACHE_SCORING);
  if (sc && sc.value) resultsIdx = buildResultsIndex(sc.value);
  if (rides.length) render();
}

// ---- Auto-reload on redeploy ----
// Polls this page's own URL and reloads when the deployed bytes change, so
// delay/follow-list edits reach open phones within a minute of deploy —
// no separate signal file to maintain, any commit to the page is the signal.
let deployBaseline = null;
async function checkForNewDeploy() {
  if (!location.protocol.startsWith("http")) return; // no-op for file://
  try {
    const resp = await fetch(location.href, { cache: "no-store" });
    if (!resp.ok) return;
    const text = await resp.text();
    if (deployBaseline === null) deployBaseline = text;
    else if (text !== deployBaseline) location.reload();
  } catch (e) { /* offline blip; try again next tick */ }
}

// ---- "My riders" picker sheet ----

function renderRiderSheet() {
  const current = effectiveFollowing();
  document.getElementById("my-riders-list").innerHTML = (current.length
    ? current.map(n => `<div class="rrow"><span>${esc(n)}</span><button class="rbtn rm" data-n="${esc(n)}">Remove</button></div>`).join("")
    : `<div class="sheet-sub">Not following anyone — search below to add.</div>`)
    + (getHiddenRiders().length
    ? `<div class="sheet-sub">Removed: ${esc(getHiddenRiders().join("; "))} · <button class="linklike" id="restore-shared">restore</button></div>`
    : "");
  const q = document.getElementById("rider-search").value.trim().toLowerCase();
  const resEl = document.getElementById("rider-results");
  if (q.length < 2) { resEl.innerHTML = ""; return; }
  const followedNow = new Set(current);
  const hits = allRiders.filter(r => r.name.toLowerCase().includes(q)).slice(0, 20);
  resEl.innerHTML = hits.length
    ? hits.map(r => {
        const action = followedNow.has(r.name)
          ? `<button class="rbtn rm" data-n="${esc(r.name)}">Remove</button>`
          : `<button class="rbtn add" data-n="${esc(r.name)}">Add</button>`;
        return `<div class="rrow"><span>${esc(r.name)}<small> · ${esc(r.horses.join(", "))}</small></span>${action}</div>`;
      }).join("")
    : `<div class="sheet-sub">No match.</div>`;
}

document.getElementById("edit-riders").addEventListener("click", () => {
  document.getElementById("rider-sheet").hidden = false;
  renderRiderSheet();
});
document.getElementById("sheet-close").addEventListener("click", () => {
  document.getElementById("rider-sheet").hidden = true;
});
document.getElementById("rider-sheet").addEventListener("click", ev => {
  if (ev.target.id === "rider-sheet") { ev.currentTarget.hidden = true; return; } // backdrop tap
  if (ev.target.id === "restore-shared") {
    setStoredList(HIDDEN_RIDERS_KEY, []);
  } else {
    const btn = ev.target.closest(".rbtn");
    if (!btn) return;
    const name = btn.dataset.n;
    const mine = getMyRiders(), hidden = getHiddenRiders();
    if (btn.classList.contains("add")) {
      // Re-adding a hidden shared rider un-hides it; otherwise it's a personal add.
      if (hidden.includes(name)) setStoredList(HIDDEN_RIDERS_KEY, hidden.filter(n => n !== name));
      else if (!mine.includes(name)) setStoredList(MY_RIDERS_KEY, [...mine, name]);
    } else {
      // Removing: personal adds are deleted; shared riders are hidden locally.
      if (mine.includes(name)) setStoredList(MY_RIDERS_KEY, mine.filter(n => n !== name));
      else if (!hidden.includes(name)) setStoredList(HIDDEN_RIDERS_KEY, [...hidden, name]);
    }
  }
  if (lastFeed) rides = extractRides(lastFeed);
  renderRiderSheet();
  render();
});
document.getElementById("rider-search").addEventListener("input", renderRiderSheet);

document.getElementById("now-btn").addEventListener("click", () => {
  const el = document.querySelector(".now-line");
  if (!el) return;
  // Put the now-line ~25% down the screen: a little context above, mostly
  // upcoming rides below.
  const y = el.getBoundingClientRect().top + window.scrollY - window.innerHeight * 0.25;
  window.scrollTo({ top: Math.max(0, y), behavior: "smooth" });
});
window.addEventListener("scroll", updateNowBtn, { passive: true });

fetchEventFeed();
fetchScoring();
checkForNewDeploy();
setInterval(fetchEventFeed, EVENT_POLL_MS);
setInterval(fetchScoring, SCORING_POLL_MS);
setInterval(checkForNewDeploy, DEPLOY_POLL_MS);
setInterval(render, 30_000); // keep countdowns fresh between fetches
</script>
</body>
